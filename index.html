  <style>
    :root {
      --bg: #efe6d8;
      --ink: #201812;
      --muted: #6b5d4d;
      --card: rgba(252, 248, 239, 0.86);
      --line: rgba(91, 66, 40, 0.14);
      --accent: #8b2e1d;
      --shadow: 0 20px 60px rgba(52, 33, 14, 0.12);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      font-family: "Iowan Old Style", "Palatino Linotype", "Source Han Serif SC", "Songti SC", serif;

        linear-gradient(145deg, #f3eadc 0%, #ebddc7 45%, #e1ceb4 100%);
    }

    .shell {
      width: min(1220px, calc(100vw - 32px));
      margin: 28px auto 56px;
      display: grid;
      gap: 22px;
    }

    .hero,
    .books {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 28px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
    }

    .hero {
      padding: 30px 32px;
      display: grid;
      gap: 18px;
    }

    .eyebrow {
      margin: 0;
      color: var(--accent);
      letter-spacing: 0.14em;
      text-transform: uppercase;
      font-size: 12px;
    }

    h1 {
      margin: 0;
      font-size: clamp(34px, 5vw, 60px);
      line-height: 0.98;
      max-width: 10ch;
    }

    .summary {
      margin: 0;
      max-width: 54rem;
      font-size: 16px;
      line-height: 1.85;
      color: var(--muted);
    }

    .picker {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
      align-items: end;
    }

    .field {
      display: grid;
      gap: 8px;
    }

    .field label {
      color: var(--muted);
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .field select,
    .field button {
      width: 100%;
      min-height: 48px;
      border-radius: 16px;
      border: 1px solid rgba(117, 86, 58, 0.14);
      background: rgba(255, 252, 247, 0.92);
      color: var(--ink);
      font: inherit;
      padding: 0 14px;
    }

    .field button {
      cursor: pointer;
      background: linear-gradient(135deg, #8b2e1d, #b55a30);
      color: #fff8ef;
      border: 0;
      box-shadow: 0 12px 24px rgba(139, 46, 29, 0.2);
    }

    .field button.secondary {
      background: rgba(255, 252, 247, 0.92);
      color: var(--ink);
      border: 1px solid rgba(117, 86, 58, 0.14);
      box-shadow: none;
    }

    .field button:disabled,
    .field select:disabled {
      cursor: default;
      opacity: 0.5;
      box-shadow: none;
    }

    .actions {
      gap: 10px;
    }

    .action-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      gap: 10px;
    }

    .selection-hint {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.7;
    }

    .books {
      padding: 24px;
    }

    .books h2 {
      margin: 0 0 16px;
      font-size: 24px;
    }

    .book-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 14px;
    }

    .book-card {
      display: grid;
      gap: 8px;
      padding: 18px;
      border-radius: 20px;
      text-decoration: none;
      color: inherit;
      background: rgba(255, 252, 247, 0.78);
      border: 1px solid rgba(117, 86, 58, 0.1);
      transition: transform 0.16s ease, box-shadow 0.16s ease;
    }

    .book-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 28px rgba(52, 33, 14, 0.08);
    }

    .book-meta {
      color: var(--accent);
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .book-title {
      font-size: 24px;
      line-height: 1.15;
    }

    .book-subtitle,
    .book-stats {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.6;
    }

    @media (max-width: 760px) {
      .picker {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 640px) {
      .shell {
        width: min(100vw - 18px, 100%);
      }

      .hero,
      .books {
        padding: 18px;
        border-radius: 22px;
      }
    }
  </style>

 "url": "books/09-同频失眠-原创样章/chapters/001-第一章-临时合租.html", "density": 18.52}}];
    const novelSelect = document.getElementById("novelSelect");
    const chapterSelect = document.getElementById("chapterSelect");
    const openChapter = document.getElementById("openChapter");
    const selectionHint = document.getElementById("selectionHint");

    function renderNovelOptions(selectedIndex = 0) {
      novelSelect.innerHTML = library.map((book, index) =>
        `<option value="${index}">${book.title}</option>`
      ).join("");
      novelSelect.value = String(selectedIndex);
    }

    function formatChapterLabel(chapter) {
      return `${chapter.part || "正文"} · ${chapter.title}`;
    }

    function currentBook() {
      return library[Number(novelSelect.value)] || library[0];
    }

    function currentChapter(book) {
      return book.chapters.find((chapter) => chapter.url === chapterSelect.value) || book.chapters[0] || null;
    }

    function syncLocation() {
      const book = currentBook();
      const chapter = currentChapter(book);
      const url = new URL(window.location.href);
      url.searchParams.set("book", book.slug);
      if (chapter) {
        url.searchParams.set("chapter", chapter.slug);
      } else {
        url.searchParams.delete("chapter");
      }
      history.replaceState(null, "", url);
    }

    function updateHint() {
      const book = currentBook();
      const chapter = currentChapter(book);
      if (!chapter) {
        selectionHint.textContent = `${book.title} · 暂无可读章节`;
        return;
      }
      const author = book.author ? ` · ${book.author}` : "";
      selectionHint.textContent = `${book.title}${author} · ${chapter.part || "正文"} · ${chapter.title}`;
    }

    function renderChapterOptions(bookIndex, preferredChapterSlug = "") {
      const book = library[bookIndex];
      chapterSelect.innerHTML = book.chapters.map((chapter) =>
        `<option value="${chapter.url}">${formatChapterLabel(chapter)}</option>`
      ).join("");
      const preferred = book.chapters.find((chapter) => chapter.slug === preferredChapterSlug) || book.chapters[0] || null;
      if (preferred) {
        chapterSelect.value = preferred.url;
      }
      const disabled = !preferred;
      chapterSelect.disabled = disabled;
      openChapter.disabled = disabled;
    }

    novelSelect.addEventListener("change", () => {
      renderChapterOptions(Number(novelSelect.value));
      updateHint();
      syncLocation();
    });

    chapterSelect.addEventListener("change", () => {
      updateHint();
      syncLocation();
    });

    openChapter.addEventListener("click", () => {
      if (chapterSelect.value) {
        window.location.href = chapterSelect.value;
      }
    });

    const params = new URLSearchParams(window.location.search);
    const initialBookIndex = Math.max(
      library.findIndex((book) => book.slug === params.get("book")),
      0
    );

    renderNovelOptions(initialBookIndex);
    renderChapterOptions(initialBookIndex, params.get("chapter") || "");
    updateHint();
    syncLocation();
  </script>
