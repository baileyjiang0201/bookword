<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>书词间 · 中英混读</title>
  <style>
    :root {
      --bg: #efe6d8;
      --ink: #201812;
      --muted: #6b5d4d;
      --card: rgba(252, 248, 239, 0.86);
      --line: rgba(91, 66, 40, 0.14);
      --accent: #8b2e1d;
      --shadow: 0 20px 60px rgba(52, 33, 14, 0.12);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      font-family: "Iowan Old Style", "Palatino Linotype", "Source Han Serif SC", "Songti SC", serif;
      background:
        radial-gradient(circle at top left, rgba(255, 250, 239, 0.96), transparent 32%),
        linear-gradient(145deg, #f3eadc 0%, #ebddc7 45%, #e1ceb4 100%);
    }

    .shell {
      width: min(1220px, calc(100vw - 32px));
      margin: 28px auto 56px;
      display: grid;
      gap: 22px;
    }

    .hero,
    .books {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 28px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
    }

    .hero {
      padding: 34px 36px;
      display: grid;
      gap: 22px;
    }

    .brand {
      display: grid;
      gap: 10px;
    }

    .brand-name {
      margin: 0;
      font-size: clamp(40px, 7vw, 78px);
      line-height: 0.92;
      letter-spacing: 0.08em;
      color: var(--accent);
    }

    .brand-slogan {
      margin: 0;
      color: var(--muted);
      font-size: clamp(16px, 2.4vw, 22px);
      line-height: 1.7;
    }

    .summary {
      margin: 0;
      max-width: 46rem;
      font-size: 17px;
      line-height: 1.9;
      color: var(--muted);
    }

    .picker {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
      align-items: end;
    }

    .field {
      display: grid;
      gap: 8px;
    }

    .field label {
      color: var(--muted);
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .field select,
    .field button {
      width: 100%;
      min-height: 48px;
      border-radius: 16px;
      border: 1px solid rgba(117, 86, 58, 0.14);
      background: rgba(255, 252, 247, 0.92);
      color: var(--ink);
      font: inherit;
      padding: 0 14px;
    }

    .field button {
      cursor: pointer;
      background: linear-gradient(135deg, #8b2e1d, #b55a30);
      color: #fff8ef;
      border: 0;
      box-shadow: 0 12px 24px rgba(139, 46, 29, 0.2);
    }

    .field button.secondary {
      background: rgba(255, 252, 247, 0.92);
      color: var(--ink);
      border: 1px solid rgba(117, 86, 58, 0.14);
      box-shadow: none;
    }

    .field button:disabled,
    .field select:disabled {
      cursor: default;
      opacity: 0.5;
      box-shadow: none;
    }

    .actions {
      gap: 10px;
    }

    .action-row {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .books {
      padding: 24px;
    }

    .books h2 {
      margin: 0 0 16px;
      font-size: 24px;
    }

    .book-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 14px;
    }

    .book-card {
      display: grid;
      gap: 8px;
      padding: 18px;
      border-radius: 20px;
      text-decoration: none;
      color: inherit;
      background: rgba(255, 252, 247, 0.78);
      border: 1px solid rgba(117, 86, 58, 0.1);
      transition: transform 0.16s ease, box-shadow 0.16s ease;
    }

    .book-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 28px rgba(52, 33, 14, 0.08);
    }

    .book-meta {
      color: var(--accent);
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .book-meta strong {
      color: var(--ink);
      font-size: 12px;
      letter-spacing: 0.06em;
    }

    .book-title {
      font-size: 24px;
      line-height: 1.15;
    }

    .book-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .book-tag {
      display: inline-flex;
      align-items: center;
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(139, 46, 29, 0.08);
      color: var(--accent);
      font-size: 12px;
      line-height: 1;
    }

    .book-stats {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.6;
    }

    @media (max-width: 760px) {
      .picker {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 640px) {
      .shell {
        width: min(100vw - 18px, 100%);
      }

      .hero,
      .books {
        padding: 18px;
        border-radius: 22px;
      }
    }
  </style>
</head>

    const initialChannel = channelConfig.some((channel) => channel.id === requestedChannel)
      ? requestedChannel
      : (books.find((book) => book.slug === requestedBookSlug)?.channel || "female");

    renderChannelOptions(initialChannel);
    renderNovelOptions(requestedBookSlug);
    renderBookGrid();
    syncLocation();
  </script>
</body>
</html>
